<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Felicity.gg</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Times New Roman',Times,serif;background:#fff;color:#000;font-size:14px;padding:8px}
a{color:blue}
input,select,textarea,button{font-family:inherit;font-size:13px;margin:2px 0}
button{cursor:pointer;background:#ddd;border:1px solid #000;padding:2px 10px}
button:hover{background:#bbb}
input,select,textarea{border:1px solid #000;padding:2px 4px}
table{border-collapse:collapse;width:100%}
td,th{border:1px solid #000;padding:2px 6px;text-align:left;font-size:13px}
th{background:#eee}
hr{margin:5px 0;border:none;border-top:1px solid #999}
.nav{background:#eee;border-bottom:1px solid #000;padding:4px 8px;margin:-8px -8px 8px -8px;font-size:13px}
.nav a{margin-right:12px;text-decoration:none}
.nav a:hover{text-decoration:underline}
h1{font-size:18px;margin:4px 0}
h2{font-size:15px;margin:4px 0}
h3{font-size:14px;margin:3px 0}
.card{border:1px solid #000;padding:6px;margin:4px 0;background:#fafafa}
.tabs span{cursor:pointer;padding:2px 8px;border:1px solid #000;margin-right:2px;font-size:12px;background:#eee}
.tabs span.active{background:#000;color:#fff}
.err{color:red;font-size:12px}
.ok{color:green;font-size:12px}
label{display:block;margin:2px 0;font-size:13px}
</style>
</head>
<body>
<div id="root"></div>
</body>
</html>
